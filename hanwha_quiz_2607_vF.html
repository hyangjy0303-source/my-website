<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: linear-gradient(135deg, #FFF4ED 0%, #F0F4FF 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: #fff;
    border-radius: 24px;
    max-width: 540px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 8px 48px rgba(255,107,0,0.10), 0 2px 12px rgba(0,0,0,0.06);
  }

  .top-bar {
    background: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #F5F5F5;
  }

  .progress-track {
    height: 3px;
    background: #F0F0F0;
    width: 100%;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FF6B00, #FF9A4D);
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .inner { padding: 36px 28px 32px; }

  /* ── Intro ── */
  .intro { text-align: center; }
  .intro-emoji { font-size: 52px; display: block; margin-bottom: 18px; }
  .intro-badge {
    display: inline-block;
    background: linear-gradient(90deg, #FF6B00, #FF9A4D);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 99px;
    letter-spacing: 0.04em;
    margin-bottom: 18px;
  }
  .intro-title {
    font-size: 26px;
    font-weight: 800;
    color: #1A1A1A;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .intro-title .highlight { color: #FF6B00; }
  .intro-desc {
    font-size: 14px;
    color: #999;
    line-height: 1.9;
    margin-bottom: 32px;
  }
  .intro-desc strong { color: #FF6B00; font-weight: 700; }

  /* ── Quiz ── */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .q-num-badge {
    background: #FF6B00;
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    padding: 4px 14px;
    border-radius: 99px;
    letter-spacing: 0.04em;
  }
  .step-label {
    font-size: 12px;
    color: #CCCCCC;
    font-weight: 500;
  }
  .q-text {
    font-size: 20px;
    font-weight: 800;
    color: #1A1A1A;
    line-height: 1.45;
    margin-bottom: 6px;
  }
  .q-sub {
    font-size: 13px;
    color: #BBBBBB;
    margin-bottom: 24px;
    font-weight: 400;
  }

  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .opt {
    display: flex;
    align-items: center;
    border: 1.5px solid #EFEFEF;
    border-radius: 14px;
    cursor: pointer;
    background: #FAFAFA;
    transition: all 0.15s;
    overflow: hidden;
    text-align: left;
  }
  .opt:hover { border-color: #FF6B00; background: #FFF8F4; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,107,0,0.08); }
  .opt.selected { border-color: #FF6B00; background: #FFF3EB; box-shadow: 0 4px 16px rgba(255,107,0,0.12); }
  .opt-icon-box {
    min-width: 54px;
    height: 54px;
    background: #FFE8D6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .opt.selected .opt-icon-box { background: #FF6B00; }
  .opt-text {
    font-size: 13.5px;
    color: #444;
    line-height: 1.65;
    padding: 13px 16px;
    font-weight: 500;
  }
  .opt.selected .opt-text { color: #BF3F00; font-weight: 600; }

  /* ── Buttons ── */
  .btn-primary {
    width: 100%;
    padding: 17px;
    background: #1A1A1A;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.01em;
    font-family: inherit;
  }
  .btn-primary:hover { background: #333; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

  .btn-orange {
    width: 100%;
    padding: 17px;
    background: linear-gradient(90deg, #FF6B00, #FF8C38);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.01em;
    font-family: inherit;
  }
  .btn-orange:hover { background: linear-gradient(90deg, #E55A00, #FF7A1F); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,0,0.25); }
  .btn-orange.disabled { opacity: 0.3; pointer-events: none; }

  .btn-secondary {
    flex: 1;
    padding: 14px;
    background: #F5F5F2;
    color: #777;
    border: none;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn-secondary:hover { background: #EAEAE7; }

  .btn-newsletter {
    width: 100%;
    padding: 15px;
    background: #fff;
    color: #FF6B00;
    border: 2px solid #FF6B00;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.01em;
    font-family: inherit;
    margin-top: 10px;
  }
  .btn-newsletter:hover { background: #FFF3EB; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,107,0,0.12); }

  .btn-close {
    width: 100%;
    padding: 13px;
    background: transparent;
    color: #BBBBBB;
    border: 1.5px solid #EFEFEF;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    margin-top: 8px;
  }
  .btn-close:hover { background: #F8F8F8; color: #888; }

  /* ── Result ── */
  .result-top {
    background: linear-gradient(135deg, #FF6B00, #FF9A4D);
    margin: -36px -28px 24px;
    padding: 32px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .result-top::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .result-top::after {
    content: '';
    position: absolute;
    bottom: -20px; left: -20px;
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .result-emoji { font-size: 52px; display: block; margin-bottom: 12px; }
  .result-badge-label {
    display: inline-block;
    background: rgba(255,255,255,0.22);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 99px;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    backdrop-filter: blur(4px);
  }
  .result-type { font-size: 22px; font-weight: 800; color: #fff; line-height: 1.3; }

  .result-desc {
    font-size: 14px;
    color: #666;
    line-height: 1.95;
    margin-bottom: 22px;
    padding-bottom: 22px;
    border-bottom: 1.5px solid #F5F5F5;
  }
  .sol-label {
    font-size: 10px;
    font-weight: 800;
    color: #CCCCCC;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .sol-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
  .pill {
    font-size: 12px;
    padding: 5px 13px;
    border-radius: 99px;
    border: 1.5px solid #FFD4B3;
    color: #BF3F00;
    background: #FFF3EB;
    font-weight: 600;
  }
  .sol-desc {
    font-size: 13px;
    color: #999;
    line-height: 1.8;
    margin-bottom: 24px;
    padding: 14px 16px;
    background: #FAFAFA;
    border-radius: 12px;
    border-left: 3px solid #FF6B00;
  }
  .action-row { display: flex; gap: 10px; margin-bottom: 0; }
</style>

let answers = [], current = 0, selected = null;

function getResult(ans) {
  const counts = [0,0,0,0];
  ans.forEach(v => counts[v]++);
  if (ans[2] === 0 && counts[0] >= 2) return "data";
  if (ans[2] === 2) return "ai";
  if (counts[1] >= 2) return "factory";
  if (counts[2] >= 2) return "cloud";
  if (counts[3] >= 2) return "erp";
  if ((ans[1] === 1 && ans[3] === 3) || (ans[2] === 1 && ans[3] === 3)) return "logistics";
  if (ans[0] === 3 && ans[3] === 3) return "logistics";
  if (ans[1] === 1 || ans[0] === 1) return "factory";
  if (ans[1] === 2 || ans[0] === 2) return "cloud";
  if (ans[1] === 3 || ans[3] === 3) return "erp";
  if (counts[0] >= 2) return "data";
  return ["data","factory","cloud","erp"][ans[ans.length-1]];
}

function startQuiz() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  render();
}

function render() {
  const q = questions[current];
  document.getElementById('q-num').textContent = `Q${current+1}.`;
  document.getElementById('step-label').textContent = `${current+1} / ${questions.length}`;
  document.getElementById('progress').style.width = ((current) / questions.length * 100) + '%';
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-sub').textContent = q.sub;
  document.getElementById('options').innerHTML = q.opts.map((o,i) =>
    `<button class="opt${selected===i?' selected':''}" onclick="pick(${i})">
      <span class="opt-icon-box">${o.icon}</span>
      <span class="opt-text">${o.text.replace('\n','<br>')}</span>
    </button>`
  ).join('');
  const nb = document.getElementById('next-btn');
  nb.textContent = current === questions.length-1 ? '결과 보기 →' : '다음으로 →';
  nb.className = 'btn-orange' + (selected !== null ? '' : ' disabled');
}

function pick(i) { selected = i; render(); }

function nextQ() {
  if (selected === null) return;
  answers.push(selected);
  if (current < questions.length - 1) { current++; selected = null; render(); }
  else showResult();
}

function showResult() {
  const key = getResult(answers);
  const r = results[key];
  document.getElementById('progress').style.width = '100%';
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';
  rs.innerHTML = `
    <div class="result-top">
      <span class="result-emoji">${r.emoji}</span>
      <div class="result-badge-label">${r.badge}</div>
      <div class="result-type">${r.type}</div>
    </div>
    <div class="result-desc">${r.desc}</div>
    <div class="sol-label">매핑된 솔루션</div>
    <div class="sol-pills">${r.solutions.map(s=>`<span class="pill">${s}</span>`).join('')}</div>
    <div class="sol-desc">${r.sol_desc}</div>
    <div class="action-row">
      <button class="btn-secondary" onclick="restart()">🔄 다시 해보기</button>
      <button class="btn-orange" id="sol-link-btn" style="flex:2">솔루션 더 알아보기 →</button>
    </div>
    <button class="btn-newsletter" id="newsletter-btn">📩 한화시스템 ICT 뉴스레터 구독하기</button>
  `;
  document.getElementById('sol-link-btn').addEventListener('click', function() {
    window.open(r.url, '_blank');
  });
  document.getElementById('newsletter-btn').addEventListener('click', function() {
    window.open('https://page.stibee.com/subscriptions/494176', '_blank');
  });
}

function restart() {
  answers = []; current = 0; selected = null;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('intro-screen').style.display = 'block';
  document.getElementById('progress').style.width = '0%';
}
</script>
